# CodeRabbit configuration for Gateling-TMS
# https://docs.coderabbit.ai/reference/configuration

language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/package-lock.json"
    - "!**/*.lock"
    - "!**/drizzle/meta/**"
    - "!**/drizzle/**/_journal.json"
    - "!**/node_modules/**"
    - "!**/.next/**"

chat:
  auto_reply: true
